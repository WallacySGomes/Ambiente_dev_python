{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Dossiê</title>

    <!-- BOXICONS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'login/css/login.css' %}">
</head>

<body class="background">

    <!-- HEADER -->
    <header>

        <nav class="navbar">

            <a href="{% url 'home' %}" class="logo">
                Dossiê CEMOT NOC
            </a>

            <ul class="menu-links">

                <li>
                    <a href="{% url 'home' %}">
                        Home
                    </a>
                </li>

                <li>
                    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
                       target="_blank">
                        Retornar ao Turno Fácil
                    </a>
                </li>

            </ul>

        </nav>

    </header>

    <!-- LOGIN -->
    <main class="wrapper">

        <form method="POST">

            {% csrf_token %}

            <h1>Login</h1>

            <!-- USERNAME -->
            <div class="input-box">

                <input
                    id="username"
                    name="username"
                    type="text"
                    placeholder="Usuário"
                    required
                >

                <i class="bx bx-user"></i>

            </div>

            <!-- PASSWORD -->
            <div class="input-box">

                <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Senha"
                    required
                >

                <i class="bx bx-lock"></i>

            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn-login">
                Login
            </button>

            <!-- MESSAGE -->
            <div class="register-message">

                <p>
                    Não possui acesso?
                    Contate um
                    <span class="adm">
                        administrador
                    </span>.
                </p>

            </div>

        </form>

    </main>

</body>

</html>
